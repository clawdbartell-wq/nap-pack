descriptions:
  long: |
    Acme HR Consulting is a Seattle-based talent strategy and HR consulting firm
    serving small professional services firms with 5-25 employees. We work with law
    firms, accounting firms, consultancies, financial advisory practices, marketing
    agencies, IT services companies, real estate firms, and architecture &
    engineering practices across King County, Washington.

    Our services cover the full talent lifecycle: HR systems implementation, talent
    acquisition strategy, fractional HR leadership, Washington state HR compliance,
    employee onboarding, and recruiting consulting. Whether you need a compliance
    audit, a fractional CHRO to build your people operations, or a full recruiting
    engagement, we deliver enterprise-grade talent support at a fraction of the
    cost of a full-time HR hire.

    What sets Acme HR Consulting apart is our combination of hands-on recruiting
    expertise, modern HR technology knowledge, and deep understanding of Washington
    state employment compliance. We build systems that scale with your firm — so
    you can focus on serving your clients while we handle the people side.
  short: |
    Acme HR Consulting is a Seattle-based talent strategy and HR consulting firm.
    We help small professional services firms (5-25 employees) build, scale, and
    manage their teams through HR systems setup, recruiting consulting, fractional
    HR leadership, and Washington state compliance.
  tagline: "Seattle talent strategy & HR consulting for small professional services firms"

